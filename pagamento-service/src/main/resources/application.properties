spring.application.name=pagamento-service
server.port=8083
# =========================
# DATABASE
# =========================
spring.datasource.url=jdbc:postgresql://postgres:5432/pagamentodb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# =========================
# KAFKA
# =========================
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=pagamento-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# =========================
# TOPICOS
# =========================
kafka.topic.pedido-criado=pedido.criado
kafka.topic.pagamento-aprovado=pagamento.aprovado
kafka.topic.pagamento-pendente=pagamento.pendente
# =========================
# SERVICO EXTERNO DE PAGAMENTO
# =========================
pagamento.externo.url=http://procpag:8089
# =========================
# RESILIENCE4J
# =========================
resilience4j.circuitbreaker.instances.pagamentoService.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.pagamentoService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.pagamentoService.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.pagamentoService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.pagamentoService.waitDurationInOpenState=10s
resilience4j.retry.instances.pagamentoService.maxAttempts=3
resilience4j.retry.instances.pagamentoService.waitDuration=2s
resilience4j.timelimiter.instances.pagamentoService.timeoutDuration=3s
# =========================
# LOG
# =========================
logging.level.io.github.resilience4j=INFO
logging.level.org.springframework.web=INFO