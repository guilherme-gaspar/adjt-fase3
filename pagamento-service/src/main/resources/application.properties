spring.application.name=pagamento-service
server.port=8083

spring.datasource.url=jdbc:postgresql://postgres:5432/pagamentodb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=pagamento-service
kafka.topic.pedido-criado=pedido.criado
kafka.topic.pagamento-aprovado=pagamento.aprovado
kafka.topic.pagamento-pendente=pagamento.pendente
pagamento.externo.url=http://procpag:8089
resilience4j.circuitbreaker.instances.procpag.sliding-window-size=10
resilience4j.circuitbreaker.instances.procpag.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.procpag.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.procpag.wait-duration-in-open-state=10s
resilience4j.retry.instances.procpag.max-attempts=3
resilience4j.retry.instances.procpag.wait-duration=2s
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=INFO
logging.level.io.github.resilience4j=INFO